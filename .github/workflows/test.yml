          EXCLUDE_REGEX: ${{ steps.generated_paths.outputs.grep-regex }}
        run: grep -vE "${EXCLUDE_REGEX}" cover.out > cover.filtered.out

      - name: Get total coverage
        run: |
          echo "TOTAL_COVERAGE=$(go tool cover -func cover.filtered.out | tail -n 1 | awk '{print substr($3, 1, length($3)-3)}')" \
            >> "$GITHUB_ENV"

      - name: Read build config
        id: build_config
        uses: step-security/action-read-yaml@705ee0c6475c5a26a356e79ee380eb3527b3772d # v1.0.1
        with:
          config: ${{ github.workspace }}/build-config.yaml

      - name: Calculate target coverage
        run: |
          echo "TARGET_COVERAGE=$(( \
                ${{ steps.build_config.outputs['requiredCoverage'] || 100 }} \
                + \
                TARGET_COVERAGE_DIFF \
              ))" >> "$GITHUB_ENV"

      - name: Ensure coverage is good
        if: github.event_name == 'pull_request'
        uses: step-security/actions-comment-pull-request@60cd38988a354b2d22b47612fb02a20e822d6048 # v3.0.2
        with:
          comment-tag: build_coverage
          mode: ${{ fromJSON(env.TOTAL_COVERAGE) < (steps.build_config.outputs['requiredCoverage'] || 100) && 'upsert' || 'delete' }}
          message: |
            > [!CAUTION]
            > ## :cry: Coverage is too low :cry:
            > Total coverage is `${{ env.TOTAL_COVERAGE }}%` but the required coverage is `${{ steps.build_config.outputs['requiredCoverage'] || 100 }}%`.

              Please add additional tests to increase coverage.

      - name: Fail if coverage is too low
        if: fromJSON(env.TOTAL_COVERAGE) < (steps.build_config.outputs['requiredCoverage'] || 100)
        run: exit 1

      - name: Comment PR to update build coverage
        if: github.event_name == 'pull_request'
        uses: step-security/actions-comment-pull-request@60cd38988a354b2d22b47612fb02a20e822d6048 # v3.0.2
        with:
          comment-tag: build_coverage
          mode: ${{ fromJSON(env.TOTAL_COVERAGE) > fromJSON(env.TARGET_COVERAGE) && 'upsert' || 'delete' }}
          message: |
            > [!TIP]
            > ## :heart_eyes: Coverage has improved  :heart_eyes:
            > You may want to update the coverage configuration in `./build-config.yaml` to:
              `requiredCoverage: ${{ env.TOTAL_COVERAGE }}`

              ```diff
              diff --git a/build-config.yaml b/build-config.yaml
              --- a/build-config.yaml
              +++ b/build-config.yaml
              @@ -1,1 +1,1 @@
              -requiredCoverage: ${{ steps.build_config.outputs['requiredCoverage'] || 100 }}
              +requiredCoverage: ${{ env.TOTAL_COVERAGE }}
              ```

  race:
    name: Run tests with race detector
    if: needs.read-config.outputs.separateRaceTests == 'true'
    needs:
      - read-config
    runs-on: ${{ needs.read-config.outputs.runsOn || 'go-4-core' }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          persist-credentials: false

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          owner: ${{ github.repository_owner }}
          private: ${{ github.event.repository.private }}
          private-key: ${{ secrets.PRIVATE_GO_CI_PRIVATE_KEY }}
          cache-suffix: race

      - name: Download external dependencies
        run: |
          output_dir=$(dirname "${target}")

          yq '.externalDependencies | @tsv' < build-config.yaml | # Read build config
            tail -n +2 |                                          # Remove header row
            while IFS=$'\t' read -r source target; do             # Read each line
              echo "Copying from ${source} to ${target}"          # Log action
              mkdir -p "${output_dir}"                            # Ensure target directory exists
              curl -L -o "${target}" "${source}"                  # Copy the file
            done

      - name: Setup test databases
        id: setup-databases
        uses: ./.github/actions/setup-databases

      - name: Setup Env
        run: |
          yq '.env | to_entries | @tsv' < build-config.yaml |
            tail -n +2 |
            while IFS=$'\t' read -r source target; do
                echo "${source}=${target}" >> "$GITHUB_ENV"
            done

      - name: Run tests with race detector
        timeout-minutes: 20
        env:
          ENVIRONMENT: ci
          CGO_ENABLED: 1
          GORACE: atexit_sleep_ms=50
        run: |
          module=$(go list -m)
          mapfile -t test_packages < <(go list ./... | grep -v "^${module}$")

          go test \
            -race \
            -buildvcs=true \
            -shuffle=on \
            "${test_packages[@]}"

      - name: Snapshot Postgres template cache
        if: always()
        uses: ./.github/actions/snapshot-postgres-templates
        with:
          testament-imported: ${{ steps.setup-databases.outputs.testament-imported }}
          postgres-template-cache-hit: ${{ steps.setup-databases.outputs.postgres-template-cache-hit }}
          postgres-major-version: ${{ steps.setup-databases.outputs.postgres-major-version }}

  validate_tests:
    name: Run tests and validate coverage
    needs:
      - read-config
      - test-combined
      - test
      - race
    # Always run so the required status check resolves to the actual outcome
    # of whichever mutex path ran. A SKIPPED required check is treated as
    # passing by branch protections, which previously let failing test runs
    # merge when the named-required job happened to be the skipped one.
    if: always() && !cancelled()
    runs-on: go-4-core
    timeout-minutes: 10
    steps:
      - name: Validate test results
        env:
          TEST_COMBINED: ${{ needs.test-combined.result }}
          TEST: ${{ needs.test.result }}
          RACE: ${{ needs.race.result }}
        run: |
          if [[ "$TEST_COMBINED" == "success" ]]; then
            exit 0
          fi
          if [[ "$TEST" == "success" && "$RACE" == "success" ]]; then
            exit 0
          fi
          echo "Tests did not succeed: test-combined=$TEST_COMBINED test=$TEST race=$RACE"
          exit 1

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          persist-credentials: false

      - name: Automerge
        uses: ./.github/actions/trigger-automerge
        with:
          event: ${{ toJSON(github.event) }}
          hasAutoApproverPrivateKey: ${{ secrets.AUTO_APPROVER_PRIVATE_KEY != '' }}

  otel_cicd_export:
    name: OpenTelemetry Export Trace
    if: always()
    needs: [read-config, test, test-combined, race, validate_tests]
    runs-on: go-2-core
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - name: Fetch workflow run timestamps
        id: run_times
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          json=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          echo "created_at=$(echo "$json" | jq -r '.created_at')" >> "$GITHUB_OUTPUT"
          echo "run_started_at=$(echo "$json" | jq -r '.run_started_at')" >> "$GITHUB_OUTPUT"

      - name: Export workflow trace
        uses: step-security/otel-cicd-action@867b2182ace9682deea2e7c31712596e02e72644 # v4.0.1
        continue-on-error: true
        with:
          otlpEndpoint: grpc://api.honeycomb.io:443/
          otlpHeaders: "x-honeycomb-team=${{ secrets.HONEYCOMB_GHA_SECRET }},x-honeycomb-dataset=${{ vars.HONEYCOMB_GHA_DATASET }}"
          extraAttributes: "github.workflow_run.created_at=${{ steps.run_times.outputs.created_at }},github.workflow_run.run_started_at=${{ steps.run_times.outputs.run_started_at }}"
          githubToken: ${{ secrets.GITHUB_TOKEN }}
