# DO NOT EDIT: This file should only be modified in the `go-library-template` repo.

name: Run tests and validate coverage

on:
  merge_group:
  pull_request:

env:
  TARGET_COVERAGE_DIFF: 5
  # Required to enable support for synctest.Run
  # This will be removed once we update to go 1.25
  GOEXPERIMENT: synctest
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "067421297632"
  WKHTMLTOPDF_PATH: "/bin/wkhtmltopdf"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: write # required for `workflow-dispatch` to trigger the automerge workflow
  id-token: write # required for ECR login (pull go-dtr-base container)

jobs:
  read-config:
    name: Read build configuration
    runs-on: go-4-core
    timeout-minutes: 10
    outputs:
      testRunner: ${{ steps.build_config.outputs.testRunner }}
      separateRaceTests: ${{ steps.build_config.outputs['separateRaceTests'] }}
      runsOn: ${{ steps.build_config.outputs.runsOn }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          persist-credentials: false

      - name: Read build config
        id: build_config
        uses: step-security/action-read-yaml@705ee0c6475c5a26a356e79ee380eb3527b3772d # v1.0.1
        with:
          config: ${{ github.workspace }}/build-config.yaml

  test:
    name: Run tests with coverage
    if: needs.read-config.outputs.separateRaceTests == 'true'
    needs:
      - read-config
    runs-on: ${{ needs.read-config.outputs.runsOn || 'go-4-core' }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          persist-credentials: false

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          owner: ${{ github.repository_owner }}
          private: ${{ github.event.repository.private }}
          private-key: ${{ secrets.PRIVATE_GO_CI_PRIVATE_KEY }}
          cache-suffix: cover

      - name: Download external dependencies
        run: |
          output_dir=$(dirname "${target}")

          yq '.externalDependencies | @tsv' < build-config.yaml | # Read build config
            tail -n +2 |                                          # Remove header row
            while IFS=$'\t' read -r source target; do             # Read each line
              echo "Copying from ${source} to ${target}"          # Log action
              mkdir -p "${output_dir}"                            # Ensure target directory exists
              curl -L -o "${target}" "${source}"                  # Copy the file
            done

      - name: Install Go tools
        uses: ./.github/actions/install-go-tools
        with:
          tools: |
            gotestsum
            go-ctrf-json-reporter

      - name: Setup test databases
        id: setup-databases
        uses: ./.github/actions/setup-databases

      - name: Setup Env
        run: |
          yq '.env | to_entries | @tsv' < build-config.yaml |
            tail -n +2 |
            while IFS=$'\t' read -r source target; do
                echo "${source}=${target}" >> "$GITHUB_ENV"
            done

      - name: Configure AWS credentials for ECR pull
        if: needs.read-config.outputs.testRunner != ''
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          audience: sts.amazonaws.com
          role-session-name: paddle-gha-ecr-${{ github.event.repository.name }}
          role-to-assume: arn:aws:iam::067421297632:role/paddle-tfecr-gha-ecr-${{ github.event.repository.name }}
          aws-region: us-east-1
          role-duration-seconds: 900
          retry-max-attempts: 3

      - name: Log in to Amazon ECR
        if: needs.read-config.outputs.testRunner != ''
        uses: step-security/amazon-ecr-login@d331b5a9527b998a61919b09279b64ae8944775e # v2.1.5

      - name: Run tests with coverage
        timeout-minutes: 20
        env:
          ENVIRONMENT: ci
          CGO_ENABLED: 1
          TEST_IMAGE: ${{ needs.read-config.outputs.testRunner }}
        run: |
          set -euo pipefail
          gotestsum_args=(
            --format testname
            --jsonfile test-report.json
            --
            -coverprofile=cover.out
            -covermode=atomic
            -coverpkg ./...
            -buildvcs=true
            -shuffle=on
            ./...
          )

          if [ -z "$TEST_IMAGE" ]; then
            gotestsum "${gotestsum_args[@]}"
            exit 0
          fi

          # Run go test inside the configured testRunner image. Host-side
          # steps (checkout, setup-go, setup-databases, JS-based reporting)
          # stay on the host so GHA's JS-Actions-in-Alpine-arm64 restriction
          # doesn't bite. --network host lets the containerised tests reach
          # databases setup-databases provisioned on the host. --user matches
          # the host UID so output files (coverage, CTRF) are readable by
          # subsequent host steps.
          docker run --rm \
            --network host \
            --user "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" -w "$GITHUB_WORKSPACE" \
            -v "$(go env GOMODCACHE):/tmp/gomodcache" \
            -v "$(go env GOCACHE):/tmp/gocache" \
            -e HOME=/tmp \
            -e GOMODCACHE=/tmp/gomodcache \
            -e GOCACHE=/tmp/gocache \
            -e ENVIRONMENT -e CGO_ENABLED \
            "$TEST_IMAGE" \
            gotestsum "${gotestsum_args[@]}"

      - name: Snapshot Postgres template cache
        if: always()
        uses: ./.github/actions/snapshot-postgres-templates
        with:
          testament-imported: ${{ steps.setup-databases.outputs.testament-imported }}
          postgres-template-cache-hit: ${{ steps.setup-databases.outputs.postgres-template-cache-hit }}
          postgres-major-version: ${{ steps.setup-databases.outputs.postgres-major-version }}

      - name: Convert test reports to CTRF
        if: always() && github.event_name == 'pull_request'
        run: |
          cat test-report.json | go-ctrf-json-reporter -quiet -output test-ctrf-report.json || true

      - name: Publish Test Report
        if: always() && github.event_name == 'pull_request'
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-path: test-ctrf-report.json
          pull-request-report: true
          overwrite-comment: true
          comment-tag: '${{ github.workflow }}-${{ github.event.pull_request.number }}'

      - name: Resolve generated paths
        id: generated_paths
        uses: ./.github/actions/resolve-generated-paths

      - name: Remove generated files from coverage
        env:
          EXCLUDE_REGEX: ${{ steps.generated_paths.outputs.grep-regex }}
        run: grep -vE "${EXCLUDE_REGEX}" cover.out > cover.filtered.out

      - name: Get total coverage
        run: |
          echo "TOTAL_COVERAGE=$(go tool cover -func cover.filtered.out | tail -n 1 | awk '{print substr($3, 1, length($3)-3)}')" \
            >> "$GITHUB_ENV"

      - name: Read build config
        id: build_config
        uses: step-security/action-read-yaml@705ee0c6475c5a26a356e79ee380eb3527b3772d # v1.0.1
        with:
          config: ${{ github.workspace }}/build-config.yaml

      - name: Calculate target coverage
        run: |
          echo "TARGET_COVERAGE=$(( \
                ${{ steps.build_config.outputs['requiredCoverage'] || 100 }} \
                + \
                TARGET_COVERAGE_DIFF \
              ))" >> "$GITHUB_ENV"

      - name: Ensure coverage is good
        if: github.event_name == 'pull_request'
        uses: step-security/actions-comment-pull-request@60cd38988a354b2d22b47612fb02a20e822d6048 # v3.0.2
        with:
          comment-tag: build_coverage
          mode: ${{ fromJSON(env.TOTAL_COVERAGE) < (steps.build_config.outputs['requiredCoverage'] || 100) && 'upsert' || 'delete' }}
          message: |
            > [!CAUTION]
            > ## :cry: Coverage is too low :cry:
            > Total coverage is `${{ env.TOTAL_COVERAGE }}%` but the required coverage is `${{ steps.build_config.outputs['requiredCoverage'] || 100 }}%`.

              Please add additional tests to increase coverage.

      - name: Fail if coverage is too low
        if: fromJSON(env.TOTAL_COVERAGE) < (steps.build_config.outputs['requiredCoverage'] || 100)
        run: exit 1

      - name: Comment PR to update build coverage
        if: github.event_name == 'pull_request'
        uses: step-security/actions-comment-pull-request@60cd38988a354b2d22b47612fb02a20e822d6048 # v3.0.2
        with:
          comment-tag: build_coverage
          mode: ${{ fromJSON(env.TOTAL_COVERAGE) > fromJSON(env.TARGET_COVERAGE) && 'upsert' || 'delete' }}
          message: |
            > [!TIP]
            > ## :heart_eyes: Coverage has improved  :heart_eyes:
            > You may want to update the coverage configuration in `./build-config.yaml` to:
              `requiredCoverage: ${{ env.TOTAL_COVERAGE }}`

              ```diff
              diff --git a/build-config.yaml b/build-config.yaml
              --- a/build-config.yaml
              +++ b/build-config.yaml
              @@ -1,1 +1,1 @@
              -requiredCoverage: ${{ steps.build_config.outputs['requiredCoverage'] || 100 }}
              +requiredCoverage: ${{ env.TOTAL_COVERAGE }}
              ```

  test-combined:
    name: Run tests with coverage and race detector
    if: needs.read-config.outputs.separateRaceTests != 'true'
    needs:
      - read-config
    runs-on: ${{ needs.read-config.outputs.runsOn || 'go-4-core' }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          persist-credentials: false

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          owner: ${{ github.repository_owner }}
          private: ${{ github.event.repository.private }}
          private-key: ${{ secrets.PRIVATE_GO_CI_PRIVATE_KEY }}
          cache-suffix: race

      - name: Download external dependencies
        run: |
          output_dir=$(dirname "${target}")

          yq '.externalDependencies | @tsv' < build-config.yaml | # Read build config
            tail -n +2 |                                          # Remove header row
            while IFS=$'\t' read -r source target; do             # Read each line
              echo "Copying from ${source} to ${target}"          # Log action
              mkdir -p "${output_dir}"                            # Ensure target directory exists
              curl -L -o "${target}" "${source}"                  # Copy the file
            done

      - name: Install Go tools
        uses: ./.github/actions/install-go-tools
        with:
          tools: |
            gotestsum
            go-ctrf-json-reporter

      - name: Setup test databases
        id: setup-databases
        uses: ./.github/actions/setup-databases

      - name: Setup Env
        run: |
          yq '.env | to_entries | @tsv' < build-config.yaml |
            tail -n +2 |
            while IFS=$'\t' read -r source target; do
                echo "${source}=${target}" >> "$GITHUB_ENV"
            done

      - name: Configure AWS credentials for ECR pull
        if: needs.read-config.outputs.testRunner != ''
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          audience: sts.amazonaws.com
          role-session-name: paddle-gha-ecr-${{ github.event.repository.name }}
          role-to-assume: arn:aws:iam::067421297632:role/paddle-tfecr-gha-ecr-${{ github.event.repository.name }}
          aws-region: us-east-1
          role-duration-seconds: 900
          retry-max-attempts: 3

      - name: Log in to Amazon ECR
        if: needs.read-config.outputs.testRunner != ''
        uses: step-security/amazon-ecr-login@d331b5a9527b998a61919b09279b64ae8944775e # v2.1.5

      - name: Run tests with coverage and race detector
        timeout-minutes: 20
        env:
          ENVIRONMENT: ci
          CGO_ENABLED: 1
          GORACE: atexit_sleep_ms=50
          TEST_IMAGE: ${{ needs.read-config.outputs.testRunner }}
        run: |
          set -euo pipefail
          gotestsum_args=(
            --format testname
            --jsonfile test-report.json
            --
            -v
            -coverprofile=cover.out
            -covermode=atomic
            -coverpkg ./...
            -race
            -buildvcs=true
            -shuffle=on
            ./...
          )

          if [ -z "$TEST_IMAGE" ]; then
            gotestsum "${gotestsum_args[@]}"
            exit 0
          fi

          # Run go test inside the configured testRunner image. Host-side
          # steps (checkout, setup-go, setup-databases, JS-based reporting)
          # stay on the host so GHA's JS-Actions-in-Alpine-arm64 restriction
          # doesn't bite. --network host lets the containerised tests reach
          # databases setup-databases provisioned on the host. --user matches
          # the host UID so output files (coverage, CTRF) are readable by
          # subsequent host steps.
          docker run --rm \
            --network host \
            --user "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" -w "$GITHUB_WORKSPACE" \
            -v "$(go env GOMODCACHE):/tmp/gomodcache" \
            -v "$(go env GOCACHE):/tmp/gocache" \
            -e HOME=/tmp \
            -e GOMODCACHE=/tmp/gomodcache \
            -e GOCACHE=/tmp/gocache \
            -e ENVIRONMENT -e CGO_ENABLED -e GORACE \
            "$TEST_IMAGE" \
            gotestsum "${gotestsum_args[@]}"

      - name: Snapshot Postgres template cache
        if: always()
        uses: ./.github/actions/snapshot-postgres-templates
        with:
          testament-imported: ${{ steps.setup-databases.outputs.testament-imported }}
          postgres-template-cache-hit: ${{ steps.setup-databases.outputs.postgres-template-cache-hit }}
          postgres-major-version: ${{ steps.setup-databases.outputs.postgres-major-version }}

      - name: Convert test reports to CTRF
        if: always()
        run: |
          cat test-report.json | go-ctrf-json-reporter -quiet -output test-ctrf-report.json || true

      - name: Publish Test Report
        if: always()
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-path: test-ctrf-report.json
          pull-request-report: true
          overwrite-comment: true
          comment-tag: '${{ github.workflow }}-${{ github.event.pull_request.number }}'

      - name: Resolve generated paths
        id: generated_paths
        uses: ./.github/actions/resolve-generated-paths

      - name: Remove generated files from coverage
