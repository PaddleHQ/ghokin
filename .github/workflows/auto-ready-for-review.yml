# DO NOT EDIT: This file should only be modified in the `go-library-template` repo.

# This workflow automatically changes the status of the PR to ready for review if it is draft and has the label:auto-ready-for-review

name: AutoReady for Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        # This is used to fetch the PR to determine if it is ready for review
        # It is safe as an input
        description: 'Number of the pull request'
        required: true
        type: string
      head_sha:
        # This is used to fetch the code for allcheckspassed to work
        # It is safe as an input
        description: 'Head SHA of the pull request'
        required: true
        type: string
      workflow:
        # This is used to wait for the workflow to complete before running further actions
        # It is safe as an input
        description: 'Name of the workflow that triggered this action'
        required: false
        type: string


concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.inputs.pr_number }}
  cancel-in-progress: true

# No top-level `permissions:` — every job declares its own minimum scope.
# This isolates the third-party `wechuli/allcheckspassed` action in its own
# job (`wait_for_checks`) where the GITHUB_TOKEN it inherits has only
# `checks: read`, with no access to `pull-requests: write`.
permissions: {}

jobs:

  # --
  # Cheap pre-flight: only inspects PR state, no third-party actions involved.
  # Scoped to `pull-requests: read` so the gh CLI can read labels and draft
  # state but cannot mutate the PR.
  gate:
    name: "🧠 Gate: label + draft check"
    runs-on: go-2-core
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      ok: ${{ steps.gate.outputs.ok }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.head_sha }}
          persist-credentials: false

      - name: "🧠 Check label:auto-ready-for-review is present and draft status is true"
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
            set -euo pipefail
            pr_json="$(gh pr view ${{ inputs.pr_number }} --json isDraft,labels)"
            is_draft="$(echo "$pr_json" | jq -r '.isDraft')"
            has_label="$(echo "$pr_json" | jq -r '.labels | map(.name) | index("auto-ready-for-review") | if . == null then "false" else "true" end')"

            # set ok=true if is_draft is true and has_label is true
            if [ "$is_draft" = "true" ] && [ "$has_label" = "true" ]; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
            else
              echo "ok=false" >> "$GITHUB_OUTPUT"
            fi

  # --
  # Wait for upstream checks via the third-party `wechuli/allcheckspassed`
  # action. Isolated in its own job so its GITHUB_TOKEN is scoped to
  # `checks: read` only — even a compromised version of the action cannot
  # reach the PR-mutation scope held by the downstream `mark_ready` job.
  wait_for_checks:
    name: "⏳ Wait for checks"
    runs-on: go-2-core
    timeout-minutes: 30
    needs: gate
    if: needs.gate.outputs.ok == 'true'
    permissions:
      checks: read
    outputs:
      passed: ${{ steps.confirm.outputs.passed }}

    steps:
      - name: "⏳ Wait for calling workflow to be ready"
        if: github.event.inputs.workflow != ''
        uses: wechuli/allcheckspassed@1d00cf0c34c4b0805db8866d8913f22e7125301e # v2.3.0
        id: check-caller
        with:
          delay: '0'
          poll: true
          verbose: true
          commit_sha: ${{ inputs.head_sha }}
          checks_include: ${{ github.event.inputs.workflow }}

      - name: "⏳ Wait for All Required Checks to Pass"
        if: steps.check-caller.outcome == 'success'
        uses: wechuli/allcheckspassed@1d00cf0c34c4b0805db8866d8913f22e7125301e # v2.3.0
        id: check-all
        with:
          delay: '0'
          verbose: true
          poll: false
          commit_sha: ${{ inputs.head_sha }}
          checks_exclude: (AutoReady|StepSecurity).*

      # Bubble the inner step's outcome to a job-level output, mirroring the
      # original single-job gating: `mark_ready` runs only when `check-all`
      # actually succeeded — not when it was skipped because the `workflow`
      # input was empty.
      - name: "Confirm all checks passed"
        id: confirm
        if: steps.check-all.outcome == 'success'
        run: echo "passed=true" >> "$GITHUB_OUTPUT"

  # --
  # PR mutation: marks the PR ready and removes the trigger label. Holds
  # `pull-requests: write`. Only runs if both prior jobs succeeded — gate
  # passed AND all checks passed.
  mark_ready:
    name: "🔄 Mark PR ready"
    runs-on: go-2-core
    timeout-minutes: 5
    needs:
      - gate
      - wait_for_checks
    if: needs.gate.outputs.ok == 'true' && needs.wait_for_checks.outputs.passed == 'true'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.head_sha }}
          persist-credentials: false

      - name: "🔑 Generate GitHub App Token" # github.token doesn't have permission to mark PR ready for review :(
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v1
        with:
          app-id: 1045853
          private-key: ${{ secrets.AUTO_APPROVER_PRIVATE_KEY }}

      - name: "🔄 Mark PR ready for review" # github.token doesn't have permission to mark PR ready for review :(
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        shell: bash
        run: |
          gh pr ready "${{ inputs.pr_number }}"

      - name: "🧹 Remove auto label"
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh pr edit "${{ inputs.pr_number }}" --remove-label "auto-ready-for-review"

  otel_cicd_export:
    name: OpenTelemetry Export Trace
    if: always()
    needs: [gate, wait_for_checks, mark_ready]
    runs-on: go-2-core
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read
    steps:
      - name: Export workflow trace
        uses: step-security/otel-cicd-action@867b2182ace9682deea2e7c31712596e02e72644 # v4.0.1
        continue-on-error: true
        with:
          otlpEndpoint: grpc://api.honeycomb.io:443/
          otlpHeaders: "x-honeycomb-team=${{ secrets.HONEYCOMB_GHA_SECRET }},x-honeycomb-dataset=${{ vars.HONEYCOMB_GHA_DATASET }}"
          githubToken: ${{ secrets.GITHUB_TOKEN }}
