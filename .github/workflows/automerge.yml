# DO NOT EDIT: This file should only be modified in the `go-library-template` repo.

# This workflow automatically approves and merges safe pull requests created by Dependabot, or automatic PRs from
# paddle-config and go-library-template repositories.

name: Auto Approve and Merge

on:
  workflow_dispatch:
    inputs:
      pr_number:
        # This is used to fetch the PR to determine if it is safe to merge
        # It is safe as an input
        description: 'Number of the pull request'
        required: true
        type: string
      workflow:
        # This is used to wait for the workflow to complete before running further actions
        # It is safe as an input
        description: 'Name of the workflow that triggered this action'
        required: false
        type: string


concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.inputs.pr_number }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read
  pull-requests: write

jobs:
  # --
  # Get PR info

  pr_info:
    name: "Get PR Info"
    runs-on: go-2-core

    steps:
      - name: Check sender
        env:
          SENDER: ${{ github.event.sender.login }}
        run: |
          if [[ "${SENDER}" != 'github-actions[bot]' ]]; then
            echo "❌ This action can not be triggered by a user"
            exit 1
          fi

      - name: "📥 Checkout Default Branch"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "🔍 Get PR Info"
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh pr view ${{ github.event.inputs.pr_number }} --json isDraft,author,labels,headRefName,baseRefName)

          {
            echo "draft=$(echo "${PR}" | jq -r '.isDraft')"
            echo "user_login=$(echo "${PR}" | jq -r '.author.login')"
            echo "labels=$(echo "${PR}" | jq -r '.labels | map(.name) | join(",")')"
            echo "head_ref=$(echo "${PR}" | jq -r '.headRefName')"
            echo "base_ref=$(echo "${PR}" | jq -r '.baseRefName')"
          } >> "$GITHUB_OUTPUT"

      - name: "📥 Checkout PR Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.pr-info.outputs.head_ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: "⛙ Get Merge Info"
        id: merge-base
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the merge base to determine the changes made in the PR compared to when it was branched from the
          # default branch, instead of the diff to the default branch.
          mergeBase=$(git merge-base origin/${{ steps.pr-info.outputs.base_ref }} HEAD)
          echo "merge_base=${mergeBase}" >> "$GITHUB_OUTPUT"

      - name: "📝 List changed files"
        id: changed
        env:
          MERGE_BASE: ${{ steps.merge-base.outputs.merge_base }}
        run: |
          # Emitted as a multiline output so downstream gate jobs can do
          # their scope check against a shared file list (single source of
          # truth for `git diff --name-only`).
          {
            echo 'files<<EOF'
            git diff --name-only "${MERGE_BASE}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

    outputs:
      draft: ${{ steps.pr-info.outputs.draft }}
      user_login: ${{ steps.pr-info.outputs.user_login }}
      labels: ${{ steps.pr-info.outputs.labels }}
      head_ref: ${{ steps.pr-info.outputs.head_ref }}
      merge_base: ${{ steps.merge-base.outputs.merge_base }}
      changed_files: ${{ steps.changed.outputs.files }}


  # --
  # Wait for the PR to be ready for automerge
  #
  # `permissions:` is set explicitly to `checks: read` only, overriding the
  # broader workflow-level scope. This narrows the GITHUB_TOKEN that the
  # third-party `wechuli/allcheckspassed` action receives — so even a
  # compromised version of that action cannot reach `pull-requests: write`.
  wait_for_ready:
    name: Check source and wait for PR to be ready
    runs-on: go-4-core
    needs:
      - pr_info
    permissions:
      checks: read

    if: |-
      needs.pr_info.outputs.draft == 'false' && (
        needs.pr_info.outputs.user_login == 'app/dependabot' ||
        needs.pr_info.outputs.user_login == 'app/paddle-repo-file-sync' ||
        needs.pr_info.outputs.user_login == 'app/paddle-renovate'
      )

    steps:
      - name: "🔐 Verify Automerge Secret Available"
        id: check-secret
        run: |
          if [ -z "${{ secrets.AUTO_APPROVER_PRIVATE_KEY }}" ]; then
            echo "❌ No automerge secret found - automerge disabled"
          else
            echo "✅ Automerge secret available"
            echo "can_automerge=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "🔄 Wait for calling workflow to be ready"
        if: |-
          steps.check-secret.outputs.can_automerge == 'true' &&
          github.event.inputs.workflow != ''
        uses: wechuli/allcheckspassed@1d00cf0c34c4b0805db8866d8913f22e7125301e # v2.3.0
        id: check-caller
        continue-on-error: true
        with:
          delay: '0'
          poll: true
          checks_include: ${{ github.event.inputs.workflow }}

      - name: "⏳ Wait for All Required Checks to Pass"
        if: |-
          steps.check-secret.outputs.can_automerge == 'true' &&
          steps.check-caller.outcome == 'success'
        uses: wechuli/allcheckspassed@1d00cf0c34c4b0805db8866d8913f22e7125301e # v2.3.0
        id: check-all
        continue-on-error: true
        with:
          delay: '0'
          poll: false
          checks_exclude: (\[Automerge\/.*\]|StepSecurity).*

      - name: "✅ Confirm Automerge Eligibility"
        id: check-failure
        if: |-
          steps.check-secret.outputs.can_automerge == 'true' &&
          steps.check-caller.outcome == 'success' &&
          steps.check-all.outcome == 'success'
        run: |
          echo "✅ All checks passed - automerge enabled"
          echo "can_automerge=true" >> "$GITHUB_OUTPUT"

    outputs:
      can_automerge: ${{ steps.check-secret.outputs.can_automerge && steps.check-failure.outputs.can_automerge }}

  # --
  # Check the source and the changes of the PR
  # One of the following jobs must pass for the PR to be merged automatically

  # Two independent dependabot gates, each scoped to one surface. A PR
  # passes when it's *only* changes within that surface AND those changes
  # meet the trust criteria. Out-of-scope PRs (touching other files, or
  # mixing surfaces) exit silently — the existing OR in the `automerge`
  # job's `if:` lets either gate green-light a merge.

  check_dependabot_go_deps:
    name: "[Automerge/Check] 🤖 Validate Go dependency updates"
    needs:
      - pr_info
      - wait_for_ready
    runs-on: go-4-core

    if: |-
      needs.wait_for_ready.outputs.can_automerge == 'true' &&
      needs.pr_info.outputs.user_login == 'app/dependabot'

    steps:
      - name: "📥 Checkout PR Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.pr_info.outputs.head_ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: "🔍 Validate Go dependency updates"
        id: check
        env:
          CHANGED_FILES: ${{ needs.pr_info.outputs.changed_files }}
        run: |
          # Silent exit if any changed file is outside go.mod/go.sum -
          # another gate may apply.
          if [ -z "${CHANGED_FILES}" ] || echo "${CHANGED_FILES}" | grep -qvE '^(go\.mod|go\.sum)$'; then
            echo "ℹ️ Not a pure go.mod/go.sum diff - not this gate's responsibility"
            exit 0
          fi

          if git diff --quiet -G "github.com/PaddleHQ/" ${{ needs.pr_info.outputs.merge_base }} -- go.mod; then
            REASON="Third-party Go dependency updates require manual review."
            echo "⚠️ ${REASON}"
            echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ PaddleHQ Go dependency update - automerge enabled"
          echo "can_automerge=true" >> "$GITHUB_OUTPUT"

      - name: "💬 Manage Automerge Status Comment"
        uses: ./.github/actions/automerge-skipped-comment
        with:
          pr_number: ${{ github.event.inputs.pr_number }}
          check_name: "Validate Go dependency updates"
          reason: ${{ steps.check.outputs.reason }}
          github_token: ${{ github.token }}

    outputs:
      can_automerge: ${{ steps.check.outputs.can_automerge }}

  check_dependabot_action_refs:
    name: "[Automerge/Check] 🛡️ Validate workflow action updates"
    needs:
      - pr_info
      - wait_for_ready
    runs-on: go-4-core

    if: |-
      needs.wait_for_ready.outputs.can_automerge == 'true' &&
      needs.pr_info.outputs.user_login == 'app/dependabot'

    steps:
      - name: "📥 Checkout PR Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.pr_info.outputs.head_ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: "🔍 Validate workflow action updates"
        id: check
        env:
          CHANGED_FILES: ${{ needs.pr_info.outputs.changed_files }}
        run: |
          # Pre-vetted action publishers, pipe-separated for grep alternation.
          # Keep in sync with `check-action-security.yml`.
          TRUSTED_ORGS_REGEX='(actions|github|step-security|paddlehq)'

          # Silent exit if any changed file is outside the workflow/action
          # tree - another gate may apply.
          if [ -z "${CHANGED_FILES}" ] || echo "${CHANGED_FILES}" | grep -qvE '^\.github/(workflows|actions)/'; then
            echo "ℹ️ Not a pure workflow/action diff - not this gate's responsibility"
            exit 0
          fi

          # Two greps: first picks added `uses:` lines pointing at a remote
          # owner (the `[A-Za-z0-9_-]+/` rules out local `./...` composite
          # refs — `.` is intentionally not in the char class); second drops
          # trusted orgs case-insensitively. `|| true` keeps the pipeline
          # from failing on no-match.
          UNTRUSTED=$(git diff ${{ needs.pr_info.outputs.merge_base }} -- '.github/workflows' '.github/actions' \
            | grep -E '^\+[[:space:]]+(- )?uses:[[:space:]]*["'\'']?[A-Za-z0-9_-]+/' \
            | grep -ivE "uses:[[:space:]]*[\"']?${TRUSTED_ORGS_REGEX}/" \
            || true)

          if [ -n "${UNTRUSTED}" ]; then
            REASON="Untrusted third-party action reference(s) added. Allowed orgs: actions, github, step-security, paddlehq."
            echo "⚠️ ${REASON}"
            printf '%s\n' "${UNTRUSTED}"
            {
              echo 'reason<<EOF'
              echo "${REASON}"
              echo ''
              echo '```diff'
              printf '%s\n' "${UNTRUSTED}"
              echo '```'
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ All workflow/action bumps target trusted orgs - automerge enabled"
          echo "can_automerge=true" >> "$GITHUB_OUTPUT"

      - name: "💬 Manage Automerge Status Comment"
        uses: ./.github/actions/automerge-skipped-comment
        with:
          pr_number: ${{ github.event.inputs.pr_number }}
          check_name: "Validate workflow action updates"
          reason: ${{ steps.check.outputs.reason }}
          github_token: ${{ github.token }}

    outputs:
      can_automerge: ${{ steps.check.outputs.can_automerge }}



  check_library_template_changes:
    name: "[Automerge/Check] 📝 Check GO Library Template changes"
    needs:
      - pr_info
      - wait_for_ready
    runs-on: go-4-core

    if: |-
      needs.wait_for_ready.outputs.can_automerge == 'true' &&
      needs.pr_info.outputs.user_login == 'app/paddle-repo-file-sync' &&
      (
        contains(needs.pr_info.outputs.labels, 'origin:go-library-template') ||
        contains(needs.pr_info.outputs.labels, 'origin:php-library-template') ||
        contains(needs.pr_info.outputs.labels, 'origin:example-service')
      )

    steps:
      - name: "📥 Checkout PR Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.pr_info.outputs.head_ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: "🔍 Analyze Go Library Template Changes"
        id: check-files
        env:
          CHANGED_FILES: ${{ needs.pr_info.outputs.changed_files }}
        run: |
          echo "🔍 Checking which files were modified by a library template sync..."
          # Files a library-template sync is allowed to touch. Anything else
          # → manual review.
          ALLOWED=(
            -e '^\.github/(actions|workflows)/'
            -e '^\.github/dependabot\.yml$'
            -e '^\.github/pull_request_template\.md$'
            -e '^\.github/release\.yml$'
            -e '^\.github/actionlint\.yaml$'
          )
          if [ -n "${CHANGED_FILES}" ] && ! echo "${CHANGED_FILES}" | grep -qvE "${ALLOWED[@]}"; then
            echo "✅ Only safe template files modified (workflows/dependabot) - automerge enabled"
            echo "can_automerge=true" >> "$GITHUB_OUTPUT"
          else
            REASON="Updates to files outside the safe template allow-list (\`.github/actions\`, \`.github/workflows\`, \`.github/dependabot.yml\`, \`.github/pull_request_template.md\`, \`.github/release.yml\`, \`.github/actionlint.yaml\`) — manual review required."
            echo "⚠️ ${REASON}"
            echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          fi

      - name: "💬 Manage Automerge Status Comment"
        uses: ./.github/actions/automerge-skipped-comment
        with:
          pr_number: ${{ github.event.inputs.pr_number }}
          check_name: "Check GO Library Template changes"
          reason: ${{ steps.check-files.outputs.reason }}
          github_token: ${{ github.token }}

    outputs:
      can_automerge: ${{ steps.check-files.outputs.can_automerge }}

  check_paddle_config_changes:
    name: "[Automerge/Check] ⚙️ Check Paddle Config Changes"
    needs:
      - pr_info
      - wait_for_ready
    runs-on: go-4-core

    if: |-
      needs.wait_for_ready.outputs.can_automerge == 'true' &&
      needs.pr_info.outputs.user_login == 'app/paddle-repo-file-sync' &&
      contains(needs.pr_info.outputs.labels, 'origin:paddle-config')

    steps:
      - name: "📥 Checkout PR Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.pr_info.outputs.head_ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: "📖 Read Build Configuration"
        id: build_config
        uses: step-security/action-read-yaml@705ee0c6475c5a26a356e79ee380eb3527b3772d # v1.0.1
        with:
          config: ${{ github.workspace }}/build-config.yaml

      - name: "🔍 Analyze Paddle Config Changes"
        id: check-additions
        if: steps.build_config.outputs['automergePaddleConfig'] == 'true'
        run: |
          echo "🔍 Checking for file deletions in config sync..."
          LINES_DELETED=$(git diff --shortstat ${{ needs.pr_info.outputs.merge_base }} \
            | awk '{files+=$1; inserted+=$4; deleted+=$6} END {print deleted}')

          if [ "$LINES_DELETED" -gt 0 ]; then
            REASON="Diff contains ${LINES_DELETED} deleted line(s) — paddle-config sync PRs are only auto-merged when changes are additions/modifications only."
            echo "⚠️ ${REASON}"
            echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          else
            echo "✅ No lines deleted (only additions/modifications) - automerge enabled"
            echo "can_automerge=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "💬 Manage Automerge Status Comment"
        if: steps.build_config.outputs['automergePaddleConfig'] == 'true'
        uses: ./.github/actions/automerge-skipped-comment
        with:
          pr_number: ${{ github.event.inputs.pr_number }}
          check_name: "Check Paddle Config Changes"
          reason: ${{ steps.check-additions.outputs.reason }}
          github_token: ${{ github.token }}

    outputs:
      can_automerge: ${{ steps.check-additions.outputs.can_automerge }}

  check_renovate_changes:
    name: "[Automerge/Check] ⚙️ Check Renovate Changes"
    needs:
      - pr_info
      - wait_for_ready
    runs-on: go-4-core

    if: |-
      needs.wait_for_ready.outputs.can_automerge == 'true' &&
      needs.pr_info.outputs.user_login == 'app/paddle-renovate' &&
      (
        contains(needs.pr_info.outputs.labels, 'origin:outboxer') ||
        contains(needs.pr_info.outputs.labels, 'origin:queue-relay')
      )

    steps:
      - name: "📥 Checkout PR Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.pr_info.outputs.head_ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: "📖 Read Build Configuration"
        id: build_config
        uses: step-security/action-read-yaml@705ee0c6475c5a26a356e79ee380eb3527b3772d # v1.0.1
        with:
          config: ${{ github.workspace }}/build-config.yaml

      - name: "🔍 Analyze Template Changes"
        id: check-files
        env:
          CHANGED_FILES: ${{ needs.pr_info.outputs.changed_files }}
        run: |
          echo "🔍 Checking which files were modified by a renovate sync..."
          if [ -n "${CHANGED_FILES}" ] && ! echo "${CHANGED_FILES}" | grep -qvE '\.yaml\.tmpl$'; then
            echo "✅ Only safe template files modified - automerge enabled"
            echo "can_automerge=true" >> "$GITHUB_OUTPUT"
          else
            REASON="Renovate sync modified files outside the safe \`*.yaml.tmpl\` allow-list — manual review required."
            echo "⚠️ ${REASON}"
            echo "reason=${REASON}" >> "$GITHUB_OUTPUT"
          fi

      - name: "💬 Manage Automerge Status Comment"
        uses: ./.github/actions/automerge-skipped-comment
        with:
          pr_number: ${{ github.event.inputs.pr_number }}
          check_name: "Check Renovate Changes"
          reason: ${{ steps.check-files.outputs.reason }}
          github_token: ${{ github.token }}

    outputs:
      can_automerge: ${{ steps.check-files.outputs.can_automerge }}

  # --
  # If automerge is enabled then approve and merge the PR

  automerge:
    name: "[Automerge/Merge] 🚀 Auto Approve and Merge"
    runs-on: go-4-core

    needs:
      - pr_info
      - wait_for_ready
      - check_dependabot_go_deps
      - check_dependabot_action_refs
      - check_library_template_changes
      - check_paddle_config_changes
      - check_renovate_changes

    # Run if any of the check jobs approved automerge
    # always() ensures this is a `or` condition and does not depend on ALL the checks passing, but only one.
    if: |-
      always() && (
        needs.check_dependabot_go_deps.outputs.can_automerge == 'true' ||
        needs.check_dependabot_action_refs.outputs.can_automerge == 'true' ||
        needs.check_library_template_changes.outputs.can_automerge == 'true' ||
        needs.check_paddle_config_changes.outputs.can_automerge == 'true' ||
        needs.check_renovate_changes.outputs.can_automerge == 'true'
      )

    steps:
      - name: "📥 Checkout PR Code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.pr_info.outputs.head_ref }}
          persist-credentials: false

      - name: "📖 Read Build Configuration"
        id: build_config
        uses: step-security/action-read-yaml@705ee0c6475c5a26a356e79ee380eb3527b3772d # v1.0.1
        continue-on-error: true
        with:
          config: ${{ github.workspace }}/build-config.yaml

      - name: "🔑 Generate GitHub App Token"
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: 1045853
          private-key: ${{ secrets.AUTO_APPROVER_PRIVATE_KEY }}

      - name: "✅ Auto Approve PR"
        if: steps.build_config.outputs['approveBotEnabled'] == 'true'
        run: gh pr review --approve "${{ github.event.inputs.pr_number }}"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: "🔀 Auto Merge PR"
        if: steps.build_config.outputs['mergeBotEnabled'] == 'true'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          echo "🔀 Attempting direct merge..."
          if MERGE_OUTPUT=$(gh pr merge --admin --squash "${{ github.event.inputs.pr_number }}" 2>&1); then
            echo "✅ PR merged successfully"
          elif echo "$MERGE_OUTPUT" | grep -q "merge queue"; then
            echo "🚂 Merge queue required, adding PR to queue..."
            gh pr merge --squash "${{ github.event.inputs.pr_number }}"
          else
            echo "❌ Merge failed:"
            echo "$MERGE_OUTPUT"
            exit 1
          fi

  otel_cicd_export:
    name: OpenTelemetry Export Trace
    if: always()
    needs: [pr_info, wait_for_ready, check_dependabot_go_deps, check_dependabot_action_refs, check_library_template_changes, check_paddle_config_changes, check_renovate_changes, automerge]
    runs-on: go-2-core
    permissions:
      contents: read
      actions: read
    steps:
      - name: Export workflow trace
        uses: step-security/otel-cicd-action@867b2182ace9682deea2e7c31712596e02e72644 # v4.0.1
        continue-on-error: true
        with:
          otlpEndpoint: grpc://api.honeycomb.io:443/
          otlpHeaders: "x-honeycomb-team=${{ secrets.HONEYCOMB_GHA_SECRET }},x-honeycomb-dataset=${{ vars.HONEYCOMB_GHA_DATASET }}"
          githubToken: ${{ secrets.GITHUB_TOKEN }}
